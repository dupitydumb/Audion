name: Hotfix Release
on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name to update (e.g., v1.2.3)'
        required: true
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - windows
          - linux
          - macos
          - android
          - all
      overwrite:
        description: 'Overwrite existing assets in the release'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    if: ${{ inputs.platform == 'windows' || inputs.platform == 'all' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build Tauri app
        run: npm run tauri build
      
      - name: Read release notes
        id: changelog
        shell: pwsh
        run: |
          if (-not (Test-Path "releasenote.md")) {
            $content = "Hotfix release for ${{ inputs.tag_name }}."
          } else {
            $content = Get-Content "releasenote.md" -Raw -Encoding utf8
          }
          $delimiter = "EOF_$(New-Guid)"
          echo "content<<$delimiter" >> $env:GITHUB_OUTPUT
          echo $content >> $env:GITHUB_OUTPUT
          echo $delimiter >> $env:GITHUB_OUTPUT
      
      - name: Rename Windows artifacts
        shell: pwsh
        run: |
          $version = "${{ inputs.tag_name }}".TrimStart('v')
          Get-ChildItem src-tauri/target/release/bundle/msi/*.msi | Rename-Item -NewName "audion_${version}_windows.msi"
          Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | Rename-Item -NewName "audion_${version}_windows.exe"

      - name: Upload Windows artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: ${{ inputs.tag_name }}
          body: ${{ steps.changelog.outputs.content }}
          overwrite: ${{ inputs.overwrite }}
          files: |
            src-tauri/target/release/bundle/msi/audion_*_windows.msi
            src-tauri/target/release/bundle/nsis/audion_*_windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Discord notification
        if: success()
        shell: pwsh
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TAG: ${{ inputs.tag_name }}
        run: |
          if (-not $env:DISCORD_WEBHOOK_URL) { return }
          $payload = @{
            embeds = @(@{
              title = "🛠️ Hotfix Applied (Windows): $env:TAG"
              description = "Windows build has been updated/overwritten for release $env:TAG"
              color = 16753920 # Orange
              url = "https://github.com/${{ github.repository }}/releases/tag/$env:TAG"
            })
          } | ConvertTo-Json
          Invoke-RestMethod -Uri $env:DISCORD_WEBHOOK_URL -Method Post -Body $payload -ContentType "application/json"

  release-linux:
    runs-on: ubuntu-24.04
    if: ${{ inputs.platform == 'linux' || inputs.platform == 'all' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev build-essential curl wget file libxdo-dev libssl-dev xvfb
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - name: Install dependencies
        run: npm install
      - name: Build Tauri app
        run: xvfb-run npm run tauri build
      
      - name: Rename Linux artifacts
        run: |
          VERSION=$(echo "${{ inputs.tag_name }}" | sed 's/^v//')
          mv src-tauri/target/release/bundle/deb/*.deb src-tauri/target/release/bundle/deb/audion_${VERSION}_linux.deb
          mv src-tauri/target/release/bundle/appimage/*.AppImage src-tauri/target/release/bundle/appimage/audion_${VERSION}_linux.AppImage

      - name: Upload Linux artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: ${{ inputs.tag_name }}
          overwrite: ${{ inputs.overwrite }}
          files: |
            src-tauri/target/release/bundle/deb/audion_*_linux.deb
            src-tauri/target/release/bundle/appimage/audion_*_linux.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Discord notification
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TAG: ${{ inputs.tag_name }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then exit 0; fi
          curl -H "Content-Type: application/json" -X POST -d "{\"embeds\": [{\"title\": \"🛠️ Hotfix Applied (Linux): ${TAG}\", \"description\": \"Linux build has been updated/overwritten for release ${TAG}\", \"color\": 16753920, \"url\": \"https://github.com/${{ github.repository }}/releases/tag/${TAG}\"}]}" "$DISCORD_WEBHOOK_URL"

  release-macos:
    runs-on: macos-latest
    if: ${{ inputs.platform == 'macos' || inputs.platform == 'all' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin aarch64-apple-darwin
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - name: Install dependencies
        run: npm install
      - name: Build Tauri app
        run: npm run tauri build -- --target universal-apple-darwin
      
      - name: Rename macOS artifacts
        run: |
          VERSION=$(echo "${{ inputs.tag_name }}" | sed 's/^v//')
          mv src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg src-tauri/target/universal-apple-darwin/release/bundle/dmg/audion_${VERSION}_macos.dmg
          mv src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz src-tauri/target/universal-apple-darwin/release/bundle/macos/audion_${VERSION}_macos.app.tar.gz

      - name: Upload macOS artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: ${{ inputs.tag_name }}
          overwrite: ${{ inputs.overwrite }}
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/audion_*_macos.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/audion_*_macos.app.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Discord notification
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TAG: ${{ inputs.tag_name }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then exit 0; fi
          curl -H "Content-Type: application/json" -X POST -d "{\"embeds\": [{\"title\": \"🛠️ Hotfix Applied (macOS): ${TAG}\", \"description\": \"macOS build has been updated/overwritten for release ${TAG}\", \"color\": 16753920, \"url\": \"https://github.com/${{ github.repository }}/releases/tag/${TAG}\"}]}" "$DISCORD_WEBHOOK_URL"

  release-android:
    runs-on: ubuntu-latest
    if: ${{ inputs.platform == 'android' || inputs.platform == 'all' }}
    env:
      GRADLE_OPTS: -Xmx4096m
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android
      - name: Install tauri-cli
        run: |
          wget -qO- https://github.com/cargo-bins/cargo-binstall/releases/latest/download/cargo-binstall-x86_64-unknown-linux-musl.tgz | tar -xvzf - -C ~/.cargo/bin
          cargo binstall tauri-cli --version 2.10.0 -y
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - name: Setup Signing
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > src-tauri/gen/android/release.keystore
          echo "${{ secrets.ANDROID_KEY_PROPERTIES }}" > src-tauri/gen/android/key.properties
          rm -f src-tauri/gen/android/tauri.settings.gradle
      - name: Install dependencies
        run: npm install
      - name: Clean Android generated files
        run: rm -rf src-tauri/gen/android
      - name: Build Tauri app for Android (Signed)
        run: npm run tauri android build
      
      - name: Rename Android artifacts
        run: |
          VERSION=$(echo "${{ inputs.tag_name }}" | sed 's/^v//')
          mv src-tauri/gen/android/app/build/outputs/apk/release/*.apk src-tauri/gen/android/app/build/outputs/apk/release/audion_${VERSION}_android.apk

      - name: Upload Android artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: ${{ inputs.tag_name }}
          overwrite: ${{ inputs.overwrite }}
          files: |
            src-tauri/gen/android/app/build/outputs/apk/release/audion_*_android.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Discord notification
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TAG: ${{ inputs.tag_name }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then exit 0; fi
          curl -H "Content-Type: application/json" -X POST -d "{\"embeds\": [{\"title\": \"🛠️ Hotfix Applied (Android): ${TAG}\", \"description\": \"Android build has been updated/overwritten for release ${TAG}\", \"color\": 16753920, \"url\": \"https://github.com/${{ github.repository }}/releases/tag/${TAG}\"}]}" "$DISCORD_WEBHOOK_URL"
