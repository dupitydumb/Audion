name: Release
on:
  push:
    branches:
      - master
    paths:
      - "src-tauri/tauri.conf.json"
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Type of release (main, beta, hotfix)'
        required: true
        default: 'main'
        type: choice
        options:
          - main
          - beta
          - hotfix
      tag_name:
        description: 'Tag name to update (required for hotfix, e.g., v1.2.3)'
        required: false
        type: string
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - windows
          - linux
          - flatpak
          - macos
          - android
          - all
      overwrite:
        description: 'Overwrite existing assets (only for hotfix)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Windows Build
  # ---------------------------------------------------------------------------
  release-windows:
    runs-on: windows-latest
    if: |
      github.event_name == 'push' ||
      inputs.platform == 'windows' ||
      inputs.platform == 'all'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup (Node, Rust, cache, deps)
        uses: ./.github/actions/setup
        with:
          platform: windows

      - name: Build Tauri app
        run: npm run tauri build

      - name: Set version and prerelease flags
        id: info
        shell: pwsh
        run: |
          # Determine version and prerelease status
          if ("${{ github.event_name }}" -eq "push") {
            $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
            $prerelease = $false
            $tagName = "v$version"
          } elseif ("${{ inputs.release_type }}" -eq "beta") {
            $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version + "-beta"
            $prerelease = $true
            $tagName = "v$version"
          } elseif ("${{ inputs.release_type }}" -eq "hotfix") {
            $version = "${{ inputs.tag_name }}".TrimStart('v')
            $prerelease = $false
            if ("${{ inputs.tag_name }}".StartsWith('v')) {
              $tagName = "${{ inputs.tag_name }}"
            } else {
              $tagName = "v${{ inputs.tag_name }}"
            }
          } else {
            $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
            $prerelease = $false
            $tagName = "v$version"
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "prerelease=$prerelease" >> $env:GITHUB_OUTPUT
          echo "tag_name=$tagName" >> $env:GITHUB_OUTPUT

      - name: Rename artifacts
        shell: pwsh
        run: |
          $ver = "${{ steps.info.outputs.version }}"
          Get-ChildItem src-tauri/target/release/bundle/msi/*.msi | Rename-Item -NewName "audion_${ver}_windows.msi"
          Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | Rename-Item -NewName "audion_${ver}_windows.exe"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.info.outputs.version }}
          name: ${{ inputs.release_type == 'hotfix' && steps.info.outputs.tag_name || format('v{0}', steps.info.outputs.version) }}
          body_path: releasenote.md
          prerelease: ${{ steps.info.outputs.prerelease }}
          overwrite: ${{ inputs.overwrite }}
          files: |
            src-tauri/target/release/bundle/msi/audion_*_windows.msi
            src-tauri/target/release/bundle/nsis/audion_*_windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Discord notification
        if: success()
        shell: pwsh
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: ${{ steps.info.outputs.version }}
          TAG_NAME: ${{ steps.info.outputs.tag_name }}
        run: |
          if (-not $env:DISCORD_WEBHOOK_URL) { return }
          $payload = @{
            embeds = @(
              @{
                title = "🪟 Windows build $env:TAG_NAME"
                description = "Windows release has been ${{ github.event_name == 'push' && 'created' || 'updated' }}"
                color = 1947988
                url = "https://github.com/${{ github.repository }}/releases/tag/v$env:VERSION"
              }
            )
          } | ConvertTo-Json
          Invoke-RestMethod -Uri $env:DISCORD_WEBHOOK_URL -Method Post -Body $payload -ContentType "application/json"


# ---------------------------------------------------------------------------
# Linux Build — Universal AppImage (GPU-safe, Bazzite/immutable distro compat)
# ---------------------------------------------------------------------------
  release-linux:
    runs-on: ubuntu-22.04        # ← 22.04, NOT 24.04 (older glibc = broader compat)
    needs: release-windows
    if: |
      always() &&
      (github.event_name == 'push' || inputs.platform == 'linux' || inputs.platform == 'all') &&
      (needs.release-windows.result == 'success' || needs.release-windows.result == 'skipped')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm install

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            build-essential \
            curl wget file \
            libxdo-dev \
            libssl-dev \
            libgtk-3-dev \
            libgdk-pixbuf2.0-dev \
            libsoup-3.0-dev \
            xvfb \
            libayatana-appindicator3-dev || \
            sudo apt-get install -y libappindicator3-dev

          # Minimal EGL/GL — software rasterizer only, no GPU driver deps baked in
          sudo apt-get install -y \
            libgl1-mesa-dri \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libgbm-dev

      - name: Build Tauri app
        env:
          # Software rendering for the build runner (headless CI)
          WEBKIT_DISABLE_COMPOSITING_MODE: "1"
          WEBKIT_DISABLE_DMABUF_RENDERER: "1"
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: "llvmpipe"
          GDK_BACKEND: "x11"
          XDG_SESSION_TYPE: "x11"
          WAYLAND_DISPLAY: ""
          # Do NOT force software GL into the final binary env —
          # only set for this build step so the AppImage itself stays neutral
        run: |
          xvfb-run -a \
            --server-args="-screen 0 1920x1080x24 -ac +extension GLX +render -noreset" \
            npm run tauri build

      - name: Patch AppImage with GPU-safe wrapper script
        run: |
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
          echo "Patching: $APPIMAGE"

          # Extract AppImage
          chmod +x "$APPIMAGE"
          "$APPIMAGE" --appimage-extract
          ls squashfs-root/

          # Inject wrapper that auto-detects GPU environment at runtime
          cat > squashfs-root/AppRun-real << 'WRAPPER_EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"

          # ---------------------------------------------------------------------------
          # GPU / WebKit environment auto-detection
          # Bazzite and other immutable distros may have Wayland-only or broken EGL.
          # We probe for EGL support and fall back gracefully.
          # ---------------------------------------------------------------------------

          # Always disable dmabuf renderer — it fails on many Mesa/driver combos
          export WEBKIT_DISABLE_DMABUF_RENDERER=1

          # Detect if we can use hardware compositing
          if ! command -v eglinfo &>/dev/null || ! eglinfo 2>/dev/null | grep -q "EGL_VERSION"; then
            # No working EGL — force software compositing
            export WEBKIT_DISABLE_COMPOSITING_MODE=1
            export LIBGL_ALWAYS_SOFTWARE=1
            export GALLIUM_DRIVER=llvmpipe
          fi

          # Wayland detection — prefer X11 fallback for WebKit stability
          if [ -n "$WAYLAND_DISPLAY" ] && [ -z "$FORCE_WAYLAND" ]; then
            # Running under Wayland compositor — use XWayland for WebKit
            export GDK_BACKEND=x11
            export QT_QPA_PLATFORM=xcb
          fi

          # ALSA/audio safety
          export ALSA_CONFIG_PATH=/usr/share/alsa/alsa.conf

          exec "$HERE/usr/bin/audion" "$@"
          WRAPPER_EOF

          chmod +x squashfs-root/AppRun-real

          # Back up original AppRun and replace
          mv squashfs-root/AppRun squashfs-root/AppRun-original
          cat > squashfs-root/AppRun << 'APPRUN_EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "$HERE/AppRun-real" "$@"
          APPRUN_EOF
          chmod +x squashfs-root/AppRun

          # Repack the AppImage
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O /tmp/appimagetool
          chmod +x /tmp/appimagetool

          ARCH=x86_64 /tmp/appimagetool --no-appstream squashfs-root \
            "src-tauri/target/release/bundle/appimage/audion-patched.AppImage"

          # Clean up extracted dir
          rm -rf squashfs-root

      - name: Set version and prerelease flags
        id: info
        run: |
          TAG_NAME=""
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
            PRERELEASE=false
          elif [ "${{ inputs.release_type }}" = "beta" ]; then
            VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)-beta
            PRERELEASE=true
          elif [ "${{ inputs.release_type }}" = "hotfix" ]; then
            VERSION=$(echo "${{ inputs.tag_name }}" | sed 's/^v//')
            PRERELEASE=false
            TAG_NAME="${{ inputs.tag_name }}"
            case "$TAG_NAME" in
              v*) ;;
              *) TAG_NAME="v$TAG_NAME" ;;
            esac
          else
            VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
            PRERELEASE=false
          fi
          if [ -z "$TAG_NAME" ]; then TAG_NAME="v$VERSION"; fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Rename artifacts
        run: |
          VER="${{ steps.info.outputs.version }}"
          mv src-tauri/target/release/bundle/deb/*.deb \
            src-tauri/target/release/bundle/deb/audion_${VER}_linux.deb
          mv src-tauri/target/release/bundle/appimage/audion-patched.AppImage \
            src-tauri/target/release/bundle/appimage/audion_${VER}_linux.AppImage

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.info.outputs.version }}
          name: ${{ inputs.release_type == 'hotfix' && steps.info.outputs.tag_name || format('v{0}', steps.info.outputs.version) }}
          body_path: releasenote.md
          prerelease: ${{ steps.info.outputs.prerelease }}
          overwrite: ${{ inputs.overwrite }}
          files: |
            src-tauri/target/release/bundle/deb/audion_*_linux.deb
            src-tauri/target/release/bundle/appimage/audion_*_linux.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Discord notification
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: ${{ steps.info.outputs.version }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then exit 0; fi
          curl -H "Content-Type: application/json" -X POST \
            -d "{\"embeds\": [{\"title\": \"🐧 Linux build v$VERSION\", \"description\": \"Linux release updated\", \"color\": 1947988, \"url\": \"https://github.com/${{ github.repository }}/releases/tag/v$VERSION\"}]}" \
            "$DISCORD_WEBHOOK_URL"
  # ---------------------------------------------------------------------------
  # Flatpak Build
  # ---------------------------------------------------------------------------
  release-flatpak:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    needs: release-linux
    if: |
      always() &&
      (github.event_name == 'push' || inputs.platform == 'flatpak' || inputs.platform == 'all') &&
      (needs.release-linux.result == 'success' || needs.release-linux.result == 'skipped')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set version and prerelease flags
        id: info
        run: |
          TAG_NAME=""
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
            PRERELEASE=false
          elif [ "${{ inputs.release_type }}" = "beta" ]; then
            VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)-beta
            PRERELEASE=true
          elif [ "${{ inputs.release_type }}" = "hotfix" ]; then
            VERSION=$(echo "${{ inputs.tag_name }}" | sed 's/^v//')
            PRERELEASE=false
            TAG_NAME="${{ inputs.tag_name }}"
            case "$TAG_NAME" in
              v*) ;;
              *) TAG_NAME="v$TAG_NAME" ;;
            esac
          else
            VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
            PRERELEASE=false
          fi
          if [ -z "$TAG_NAME" ]; then TAG_NAME="v$VERSION"; fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Configure Flathub remote (system scope)
        run: |
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak remotes --system

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: packaging/flatpak/com.audion.app.yml
          repository-name: flathub
          repository-url: https://flathub.org/repo/flathub.flatpakrepo
          bundle: audion_${{ steps.info.outputs.version }}_flatpak.flatpak
          cache-key: flatpak-builder-${{ runner.os }}-${{ hashFiles('packaging/flatpak/*.yml') }}-v1
          install-dependencies: true
          upload-artifact: false
          verbose: true

      - name: Verify Flatpak bundle
        run: |
          ls -la
          ls -la *.flatpak || true
          test -f "audion_${{ steps.info.outputs.version }}_flatpak.flatpak"

      - name: Upload Flatpak to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.info.outputs.version }}
          name: ${{ inputs.release_type == 'hotfix' && steps.info.outputs.tag_name || format('v{0}', steps.info.outputs.version) }}
          body_path: releasenote.md
          prerelease: ${{ steps.info.outputs.prerelease }}
          overwrite: ${{ inputs.overwrite }}
          files: audion_${{ steps.info.outputs.version }}_flatpak.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Discord notification
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: ${{ steps.info.outputs.version }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then exit 0; fi
          curl -H "Content-Type: application/json" -X POST -d "{\"embeds\": [{\"title\": \"📦 Flatpak build v$VERSION\", \"description\": \"Flatpak release has been ${{ github.event_name == 'push' && 'created' || 'updated' }}\", \"color\": 1947988, \"url\": \"https://github.com/${{ github.repository }}/releases/tag/v$VERSION\"}]}" "$DISCORD_WEBHOOK_URL"

  # ---------------------------------------------------------------------------
  # macOS Build
  # ---------------------------------------------------------------------------
  release-macos:
    runs-on: macos-latest
    needs: [release-windows, release-linux, release-flatpak]
    if: |
      always() &&
      (github.event_name == 'push' || inputs.platform == 'macos' || inputs.platform == 'all') &&
      (needs.release-windows.result == 'success' || needs.release-windows.result == 'skipped')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup (Node, Rust, cache, deps)
        uses: ./.github/actions/setup
        with:
          platform: macos
          rust_targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Build Tauri app (Universal)
        run: npm run tauri build -- --target universal-apple-darwin

      - name: Set version and prerelease flags
        id: info
        run: |
          TAG_NAME=""
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
            PRERELEASE=false
          elif [ "${{ inputs.release_type }}" = "beta" ]; then
            VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)-beta
            PRERELEASE=true
          elif [ "${{ inputs.release_type }}" = "hotfix" ]; then
            VERSION=$(echo "${{ inputs.tag_name }}" | sed 's/^v//')
            PRERELEASE=false
            TAG_NAME="${{ inputs.tag_name }}"
            case "$TAG_NAME" in
              v*) ;;
              *) TAG_NAME="v$TAG_NAME" ;;
            esac
          else
            VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
            PRERELEASE=false
          fi
          if [ -z "$TAG_NAME" ]; then TAG_NAME="v$VERSION"; fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Rename artifacts
        run: |
          VER="${{ steps.info.outputs.version }}"
          mv src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg src-tauri/target/universal-apple-darwin/release/bundle/dmg/audion_${VER}_macos.dmg

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.info.outputs.version }}
          name: ${{ inputs.release_type == 'hotfix' && steps.info.outputs.tag_name || format('v{0}', steps.info.outputs.version) }}
          body_path: releasenote.md
          prerelease: ${{ steps.info.outputs.prerelease }}
          overwrite: ${{ inputs.overwrite }}
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/audion_*_macos.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Discord notification
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: ${{ steps.info.outputs.version }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then exit 0; fi
          curl -H "Content-Type: application/json" -X POST -d "{\"embeds\": [{\"title\": \"🍎 macOS build v$VERSION\", \"description\": \"macOS release has been ${{ github.event_name == 'push' && 'created' || 'updated' }}\", \"color\": 1947988, \"url\": \"https://github.com/${{ github.repository }}/releases/tag/v$VERSION\"}]}" "$DISCORD_WEBHOOK_URL"

  # ---------------------------------------------------------------------------
  # Android Build
  # ---------------------------------------------------------------------------
  release-android:
    runs-on: ubuntu-latest
    needs: [release-windows, release-linux, release-macos]
    if: |
      always() &&
      (github.event_name == 'push' || inputs.platform == 'android' || inputs.platform == 'all') &&
      (needs.release-windows.result == 'success' || needs.release-windows.result == 'skipped')
    env:
      GRADLE_OPTS: -Xmx4096m
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node and Rust (composite action)
        uses: ./.github/actions/setup
        with:
          platform: android

      - name: Cache tauri-cli
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/tauri
          key: tauri-cli-2.10.0

      - name: Install tauri-cli (if not already)
        run: cargo install tauri-cli --version 2.10.0

      - name: Setup Signing
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > src-tauri/gen/android/release.keystore
          echo "${{ secrets.ANDROID_KEY_PROPERTIES }}" > src-tauri/gen/android/key.properties

      - name: Initialize Android project
        run: npm run tauri android init

      - name: Build Tauri app for Android (Signed)
        run: npm run tauri android build

      - name: Set version and prerelease flags
        id: info
        run: |
          TAG_NAME=""
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
            PRERELEASE=false
          elif [ "${{ inputs.release_type }}" = "beta" ]; then
            VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)-beta
            PRERELEASE=true
          elif [ "${{ inputs.release_type }}" = "hotfix" ]; then
            VERSION=$(echo "${{ inputs.tag_name }}" | sed 's/^v//')
            PRERELEASE=false
            TAG_NAME="${{ inputs.tag_name }}"
            case "$TAG_NAME" in
              v*) ;;
              *) TAG_NAME="v$TAG_NAME" ;;
            esac
          else
            VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
            PRERELEASE=false
          fi
          if [ -z "$TAG_NAME" ]; then TAG_NAME="v$VERSION"; fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Rename Android artifacts
        run: |
          VER="${{ steps.info.outputs.version }}"
          # Universal APK path (most common)
          UNIVERSAL_APK="src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk"
          if [ -f "$UNIVERSAL_APK" ]; then
            mv "$UNIVERSAL_APK" "src-tauri/gen/android/app/build/outputs/apk/audion_${VER}_android.apk"
            echo "APK renamed to audion_${VER}_android.apk"
          else
            # Fallback: search for any APK in release directories
            APK_FILE=$(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" | head -1)
            if [ -n "$APK_FILE" ]; then
              mv "$APK_FILE" "src-tauri/gen/android/app/build/outputs/apk/audion_${VER}_android.apk"
              echo "APK renamed to audion_${VER}_android.apk"
            else
              echo "No APK found"
              exit 1
            fi
          fi

      - name: Upload Android artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.info.outputs.version }}
          name: ${{ inputs.release_type == 'hotfix' && steps.info.outputs.tag_name || format('v{0}', steps.info.outputs.version) }}
          body_path: releasenote.md
          prerelease: ${{ steps.info.outputs.prerelease }}
          overwrite: ${{ inputs.overwrite }}
          files: |
            src-tauri/gen/android/app/build/outputs/apk/audion_*_android.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Discord notification
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: ${{ steps.info.outputs.version }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then exit 0; fi
          curl -H "Content-Type: application/json" -X POST -d "{\"embeds\": [{\"title\": \"🤖 Android build v$VERSION\", \"description\": \"Android release has been ${{ github.event_name == 'push' && 'created' || 'updated' }}\", \"color\": 1947988, \"url\": \"https://github.com/${{ github.repository }}/releases/tag/v$VERSION\"}]}" "$DISCORD_WEBHOOK_URL"