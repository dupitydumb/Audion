name: Release
on:
  push:
    branches:
      - master
    paths:
      - "src-tauri/tauri.conf.json"
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Type of release (main, beta, hotfix)'
        required: true
        default: 'main'
        type: choice
        options:
          - main
          - beta
          - hotfix
      tag_name:
        description: 'Tag name to update (required for hotfix, e.g., v1.2.3)'
        required: false
        type: string
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - windows
          - linux
          - macos
          - android
          - all
      overwrite:
        description: 'Overwrite existing assets (only for hotfix)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Windows Build
  # ---------------------------------------------------------------------------
  release-windows:
    runs-on: windows-latest
    if: |
      github.event_name == 'push' ||
      inputs.platform == 'windows' ||
      inputs.platform == 'all'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup (Node, Rust, cache, deps)
        uses: ./.github/actions/setup
        with:
          platform: windows

      - name: Build Tauri app
        run: npm run tauri build

      - name: Set version and prerelease flags
        id: info
        shell: pwsh
        run: |
          # Determine version and prerelease status
          if ("${{ github.event_name }}" -eq "push") {
            $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
            $prerelease = $false
          } elseif ("${{ inputs.release_type }}" -eq "beta") {
            $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version + "-beta"
            $prerelease = $true
          } elseif ("${{ inputs.release_type }}" -eq "hotfix") {
            $version = "${{ inputs.tag_name }}".TrimStart('v')
            $prerelease = $false
          } else {
            $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
            $prerelease = $false
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "prerelease=$prerelease" >> $env:GITHUB_OUTPUT
          echo "tag_name=$version" >> $env:GITHUB_OUTPUT

      - name: Rename artifacts
        shell: pwsh
        run: |
          $ver = "${{ steps.info.outputs.version }}"
          Get-ChildItem src-tauri/target/release/bundle/msi/*.msi | Rename-Item -NewName "audion_${ver}_windows.msi"
          Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | Rename-Item -NewName "audion_${ver}_windows.exe"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.info.outputs.version }}
          name: ${{ inputs.release_type == 'hotfix' && steps.info.outputs.tag_name || format('v{0}', steps.info.outputs.version) }}
          body_path: releasenote.md
          prerelease: ${{ steps.info.outputs.prerelease }}
          overwrite: ${{ inputs.overwrite }}
          files: |
            src-tauri/target/release/bundle/msi/audion_*_windows.msi
            src-tauri/target/release/bundle/nsis/audion_*_windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Discord notification
        if: success()
        shell: pwsh
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: ${{ steps.info.outputs.version }}
          TAG_NAME: ${{ steps.info.outputs.tag_name }}
        run: |
          if (-not $env:DISCORD_WEBHOOK_URL) { return }
          $payload = @{
            embeds = @(
              @{
                title = "🪟 Windows build $env:TAG_NAME"
                description = "Windows release has been ${{ github.event_name == 'push' && 'created' || 'updated' }}"
                color = 1947988
                url = "https://github.com/${{ github.repository }}/releases/tag/v$env:VERSION"
              }
            )
          } | ConvertTo-Json
          Invoke-RestMethod -Uri $env:DISCORD_WEBHOOK_URL -Method Post -Body $payload -ContentType "application/json"

  # ---------------------------------------------------------------------------
  # Linux Build
  # ---------------------------------------------------------------------------
  release-linux:
    runs-on: ubuntu-24.04
    needs: release-windows
    if: |
      always() &&
      (github.event_name == 'push' || inputs.platform == 'linux' || inputs.platform == 'all') &&
      (needs.release-windows.result == 'success' || needs.release-windows.result == 'skipped')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup (Node, Rust, cache, deps)
        uses: ./.github/actions/setup
        with:
          platform: linux

      - name: Build Tauri app
        run: xvfb-run npm run tauri build

      - name: Set version and prerelease flags
        id: info
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
            PRERELEASE=false
          elif [ "${{ inputs.release_type }}" = "beta" ]; then
            VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)-beta
            PRERELEASE=true
          elif [ "${{ inputs.release_type }}" = "hotfix" ]; then
            VERSION=$(echo "${{ inputs.tag_name }}" | sed 's/^v//')
            PRERELEASE=false
          else
            VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
            PRERELEASE=false
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT
          echo "tag_name=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename artifacts
        run: |
          VER="${{ steps.info.outputs.version }}"
          mv src-tauri/target/release/bundle/deb/*.deb src-tauri/target/release/bundle/deb/audion_${VER}_linux.deb
          mv src-tauri/target/release/bundle/appimage/*.AppImage src-tauri/target/release/bundle/appimage/audion_${VER}_linux.AppImage

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.info.outputs.version }}
          name: ${{ inputs.release_type == 'hotfix' && steps.info.outputs.tag_name || format('v{0}', steps.info.outputs.version) }}
          body_path: releasenote.md
          prerelease: ${{ steps.info.outputs.prerelease }}
          overwrite: ${{ inputs.overwrite }}
          files: |
            src-tauri/target/release/bundle/deb/audion_*_linux.deb
            src-tauri/target/release/bundle/appimage/audion_*_linux.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Discord notification
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: ${{ steps.info.outputs.version }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then exit 0; fi
          curl -H "Content-Type: application/json" -X POST -d "{\"embeds\": [{\"title\": \"🐧 Linux build v$VERSION\", \"description\": \"Linux release has been ${{ github.event_name == 'push' && 'created' || 'updated' }}\", \"color\": 1947988, \"url\": \"https://github.com/${{ github.repository }}/releases/tag/v$VERSION\"}]}" "$DISCORD_WEBHOOK_URL"

  # ---------------------------------------------------------------------------
  # macOS Build
  # ---------------------------------------------------------------------------
  release-macos:
    runs-on: macos-latest
    needs: [release-windows, release-linux]
    if: |
      always() &&
      (github.event_name == 'push' || inputs.platform == 'macos' || inputs.platform == 'all') &&
      (needs.release-windows.result == 'success' || needs.release-windows.result == 'skipped')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup (Node, Rust, cache, deps)
        uses: ./.github/actions/setup
        with:
          platform: macos

      - name: Build Tauri app (Universal)
        run: npm run tauri build -- --target universal-apple-darwin

      - name: Set version and prerelease flags
        id: info
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
            PRERELEASE=false
          elif [ "${{ inputs.release_type }}" = "beta" ]; then
            VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)-beta
            PRERELEASE=true
          elif [ "${{ inputs.release_type }}" = "hotfix" ]; then
            VERSION=$(echo "${{ inputs.tag_name }}" | sed 's/^v//')
            PRERELEASE=false
          else
            VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
            PRERELEASE=false
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT
          echo "tag_name=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename artifacts
        run: |
          VER="${{ steps.info.outputs.version }}"
          mv src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg src-tauri/target/universal-apple-darwin/release/bundle/dmg/audion_${VER}_macos.dmg
          mv src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz src-tauri/target/universal-apple-darwin/release/bundle/macos/audion_${VER}_macos.app.tar.gz

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.info.outputs.version }}
          name: ${{ inputs.release_type == 'hotfix' && steps.info.outputs.tag_name || format('v{0}', steps.info.outputs.version) }}
          body_path: releasenote.md
          prerelease: ${{ steps.info.outputs.prerelease }}
          overwrite: ${{ inputs.overwrite }}
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/audion_*_macos.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/audion_*_macos.app.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Discord notification
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: ${{ steps.info.outputs.version }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then exit 0; fi
          curl -H "Content-Type: application/json" -X POST -d "{\"embeds\": [{\"title\": \"🍎 macOS build v$VERSION\", \"description\": \"macOS release has been ${{ github.event_name == 'push' && 'created' || 'updated' }}\", \"color\": 1947988, \"url\": \"https://github.com/${{ github.repository }}/releases/tag/v$VERSION\"}]}" "$DISCORD_WEBHOOK_URL"

  # ---------------------------------------------------------------------------
  # Android Build
  # ---------------------------------------------------------------------------
  release-android:
    runs-on: ubuntu-latest
    needs: [release-windows, release-linux, release-macos]
    if: |
      always() &&
      (github.event_name == 'push' || inputs.platform == 'android' || inputs.platform == 'all') &&
      (needs.release-windows.result == 'success' || needs.release-windows.result == 'skipped')
    env:
      GRADLE_OPTS: -Xmx4096m
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node and Rust (composite action)
        uses: ./.github/actions/setup
        with:
          platform: android

      - name: Install tauri-cli (if not already)
        run: cargo install tauri-cli --version 2.10.0

      - name: Setup Signing
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > src-tauri/gen/android/release.keystore
          echo "${{ secrets.ANDROID_KEY_PROPERTIES }}" > src-tauri/gen/android/key.properties

      - name: Initialize Android project
        run: npm run tauri android init

      - name: Build Tauri app for Android (Signed)
        run: npm run tauri android build

      - name: Set version and prerelease flags
        id: info
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
            PRERELEASE=false
          elif [ "${{ inputs.release_type }}" = "beta" ]; then
            VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)-beta
            PRERELEASE=true
          elif [ "${{ inputs.release_type }}" = "hotfix" ]; then
            VERSION=$(echo "${{ inputs.tag_name }}" | sed 's/^v//')
            PRERELEASE=false
          else
            VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
            PRERELEASE=false
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT
          echo "tag_name=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          VER="${{ steps.info.outputs.version }}"
          mv src-tauri/gen/android/app/build/outputs/apk/release/*.apk src-tauri/gen/android/app/build/outputs/apk/release/audion_${VER}_android.apk

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.info.outputs.version }}
          name: ${{ inputs.release_type == 'hotfix' && steps.info.outputs.tag_name || format('v{0}', steps.info.outputs.version) }}
          body_path: releasenote.md
          prerelease: ${{ steps.info.outputs.prerelease }}
          overwrite: ${{ inputs.overwrite }}
          files: |
            src-tauri/gen/android/app/build/outputs/apk/release/audion_*_android.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Discord notification
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: ${{ steps.info.outputs.version }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then exit 0; fi
          curl -H "Content-Type: application/json" -X POST -d "{\"embeds\": [{\"title\": \"🤖 Android build v$VERSION\", \"description\": \"Android release has been ${{ github.event_name == 'push' && 'created' || 'updated' }}\", \"color\": 1947988, \"url\": \"https://github.com/${{ github.repository }}/releases/tag/v$VERSION\"}]}" "$DISCORD_WEBHOOK_URL"